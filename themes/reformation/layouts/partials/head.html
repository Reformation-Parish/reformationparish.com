<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta http-equiv="X-UA-Compatible" content="IE=edge">

<title>{{ if .IsHome }}{{ .Site.Title }}{{ with .Site.Params.tagline }} — {{ . }}{{ end }}{{ else }}{{ .Title }} | {{ .Site.Title }}{{ end }}</title>

<meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ with .Site.Params.description }}{{ . }}{{ end }}{{ end }}">
<meta name="theme-color" content="#6B1F3A">

<!-- Open Graph -->
<meta property="og:title" content="{{ .Title }}">
<meta property="og:description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
<meta property="og:type" content="{{ if .IsPage }}article{{ else }}website{{ end }}">
<meta property="og:url" content="{{ .Permalink }}">
<meta property="og:site_name" content="{{ .Site.Title }}">
<meta property="og:image" content="{{ "rp-logo-no-wordmark.svg" | absURL }}">

<!-- Canonical -->
<link rel="canonical" href="{{ .Permalink }}">

<!-- Fonts (preconnect for performance) -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<!-- Stylesheet -->
{{ $style := resources.Get "css/main.css" | fingerprint }}
<link rel="stylesheet" href="{{ $style.RelPermalink }}" integrity="{{ $style.Data.Integrity }}">

<!-- Favicon placeholder -->
<link rel="icon" type="image/svg+xml" href="{{ "rp-logo-no-wordmark.svg" | relURL }}">

<!-- Safari bookmarks / iOS home screen -->
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">

<!-- Android home screen -->
<link rel="manifest" href="/site.webmanifest">

<!-- Logos Reftagger -->
<script>
var refTagger = {
  settings: {
    bibleVersion: 'NKJV'
  }
}; 

(function(d, t) {
  var n=d.querySelector('[nonce]');
  refTagger.settings.nonce = n && (n.nonce||n.getAttribute('nonce'));
  var g = d.createElement(t), s = d.getElementsByTagName(t)[0];
  g.src = 'https://api.reftagger.com/v2/RefTagger.js';
  g.nonce = refTagger.settings.nonce;
  s.parentNode.insertBefore(g, s);
}(document, 'script'));
</script>
