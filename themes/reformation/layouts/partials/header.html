<header class="site-header site-header--transparent" id="site-header">
  <div class="site-header__inner">

    <!-- Logo -->
    <a href="{{ "/" | relURL }}" class="site-logo" aria-label="{{ .Site.Title }} — Home">
      {{ $logo := resources.Get "rp-logo-small.svg" }}
      {{ with $logo }}
        <img
          src="{{ .RelPermalink }}"
          alt="{{ $.Site.Title }} logo"
          class="site-logo__img"
          width="44"
          height="44"
        >
      {{ end }}
      <span class="site-logo__text">
        <span class="site-logo__name">Reformation<br>Parish</span>
      </span>
    </a>

    <!-- Desktop navigation -->
    <nav class="site-nav" id="site-nav" aria-label="Main navigation">
      {{ range .Site.Menus.main }}
        {{ $external := strings.HasPrefix .URL "http" }}
        <a
          href="{{ .URL | relURL }}"
          class="site-nav__link{{ if $.IsMenuCurrent "main" . }} is-current{{ end }}"
          {{ if $.IsMenuCurrent "main" . }}aria-current="page"{{ end }}
          {{ if $external }}target="_blank" rel="noopener noreferrer"{{ end }}
        >
          {{ .Name }}{{ if $external }}<svg class="ext-link-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false"><line x1="5" y1="19" x2="19" y2="5"/><polyline points="9 5 19 5 19 15"/></svg>{{ end }}
        </a>
      {{ end }}
    </nav>

    <!-- Mobile toggle -->
    <button
      class="nav-toggle"
      id="nav-toggle"
      aria-controls="site-nav"
      aria-expanded="false"
      aria-label="Toggle navigation"
    >
      <span class="nav-toggle__bar"></span>
      <span class="nav-toggle__bar"></span>
      <span class="nav-toggle__bar"></span>
    </button>

  </div>
</header>
