{{ define "main" }}

<!-- Page hero -->
<div class="page-hero">
  <div class="container">
    <span class="page-hero__label">{{ .Site.Title }}</span>
    <h1 class="page-hero__title">{{ .Title }}</h1>
    {{ with .Params.subtitle }}
      <p class="page-hero__subtitle">{{ . }}</p>
    {{ end }}
  </div>
</div>

<!-- Prose content -->
<article style="padding: var(--sp-24) 0">
  <div class="container">
    <div class="prose" data-animate>
      {{ .Content }}
    </div>
  </div>
</article>

{{ end }}
